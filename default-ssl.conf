<VirtualHost *:443>
    DocumentRoot "/var/www/html"
    ServerName threed-catalogue

    SSLEngine on
    SSLCertificateFile "/etc/apache2/ssl.crt/server.crt"
    SSLCertificateKeyFile "/etc/apache2/ssl.key/server.key"

    <Directory "/var/www/html">
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>