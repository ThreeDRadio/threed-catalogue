name: Deploy for testing

on:
  workflow_dispatch:   

env:
  CR_PAT: ${{ vars.CR_PAT }}

jobs:
  build:
    environment: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag ghcr.io/threedradio/threed-catalogue-server:testing
      
    - name: Login to the GitHub Docker registry
      run: echo $CR_PAT | docker login ghcr.io -u threedradio --password-stdin
      
    - name: Push the Docker image to ghcr.io
      run: docker push ghcr.io/threedradio/threed-catalogue-server:testing

    - name: Execute remote SSH commands using SSH key
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: | 
          whoami
          docker stop threed-catalogue-server
          docker container rm threed-catalogue-server
          docker pull ghcr.io/threedradio/threed-catalogue-server:testing
          docker run -p 9000:80 -p 9001:443 --name threed-catalogue-server -d -t ghcr.io/threedradio/threed-catalogue-server:testing
