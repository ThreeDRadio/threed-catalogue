name: Docker Image CI

on:
  workflow_dispatch:   

env:
  CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}
  CR_PAT: ${{ vars.CR_PAT }}
  CR_USER: threedradio
  SRV_HOST: ${{ vars.SERVER_HOST }}
  SRV_USER: ${{ vars.SERVER_USER }}
  PUB_KEY: ${{ secrets.SSH_PUB_KEY }}
  
jobs:
  build:
    environment: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag ghcr.io/$CR_USER/$CONTAINER_NAME:testing
      
    - name: Login to the GitHub Docker registry
      run: echo $CR_PAT | docker login ghcr.io -u $CR_USER --password-stdin
      
    - name: Push the Docker image to ghcr.io
      run: docker push ghcr.io/$CR_USER/$CONTAINER_NAME:testing

    - name: Connect to dockerhost01v SSH
      run: |
        echo $PUB_KEY >> ssh_pub_key
        ssh $SRV_USER@SRV_HOST -i ssh_pub_key

