name: Docker Image CI

on:
  workflow_dispatch:   

env:
  CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}
  
jobs:
  build:
    environment: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag $CONTAINER_NAME:latest
