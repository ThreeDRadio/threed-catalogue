name: Deploy for testing

on:
  workflow_dispatch:   

env:
  CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}
  CR_PAT: ${{ vars.CR_PAT }}
  CR_USER: threedradio

jobs:
  build:
    environment: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag ghcr.io/$CR_USER/$CONTAINER_NAME:testing
      
    - name: Login to the GitHub Docker registry
      run: echo $CR_PAT | docker login ghcr.io -u $CR_USER --password-stdin
      
    - name: Push the Docker image to ghcr.io
      run: docker push ghcr.io/$CR_USER/$CONTAINER_NAME:testing
  deploy-remote:
    environment: test
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
      - name: ssh into docker host
      with:
        host: ${{ vars.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PUB_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: whoami
