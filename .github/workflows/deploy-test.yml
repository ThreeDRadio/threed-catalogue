name: Docker Image CI

on:
  workflow_dispatch:   

env:
  CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}
  CR_PAT: ${{ vars.CR_PAT }}
  CR_USER: threedradio
  
jobs:
  build:
    environment: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag ghcr.io/$CR_USER/$CONTAINER_NAME:testing
      
    - name: Login to the GitHub Docker registry
      run: echo $CR_PAT | docker login ghcr.io -u $CR_USER --password-stdin
      
    - name: Push the Docker image to ghcr.io
      run: docker push ghcr.io/$CR_USER/$CONTAINER_NAME:testing

    - name: Build the configuration PHP file
      run: |
        echo "<?php" >> ./config.php
        echo "$db_host = \"${{ secrets.DB_HOST }}\";" >> ./config.php
        echo "$db_user = \"${{ secrets.DB_USER }}\";" >> ./config.php
        echo "$db_pass = \"${{ secrets.DB_PASS }}\";" >> ./config.php
        echo "$app_version = \"TESTING\";" >> ./config.php
        echo "$app_menu_bg_colour = \"#ff5656\";" >> ./config.php
        echo "?>"

